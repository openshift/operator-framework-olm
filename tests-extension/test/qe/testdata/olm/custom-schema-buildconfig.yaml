apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: custom-schema-buildconfig-template
objects:
- apiVersion: build.openshift.io/v1
  kind: BuildConfig
  metadata:
    name: "${NAME}"
    namespace: "${NAMESPACE}"
  spec:
    output:
      to:
        kind: ImageStreamTag
        name: "${NAME}:latest"
    source:
      type: Binary
    strategy:
      type: Docker
      dockerStrategy:
        from:
          kind: DockerImage
          name: "${BASE_IMAGE}"
parameters:
- name: NAME
- name: NAMESPACE
- name: BASE_IMAGE
